name: NyaayDesk Mobile CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # ANDROID BUILD
  # ────────────────────────────────────────────────────────────────
  android-build:
    name: Android Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Android

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> local.properties

      - name: Run unit tests
        run: ./gradlew test --parallel

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release AAB (Play Store)
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyaaydesk-debug.apk
          path: Android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nyaaydesk-release.aab
          path: Android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ────────────────────────────────────────────────────────────────
  # iOS BUILD (requires macOS runner)
  # ────────────────────────────────────────────────────────────────
  ios-build:
    name: iOS Build & Test
    runs-on: macos-14
    defaults:
      run:
        working-directory: ./IOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Resolve Swift Packages
        run: swift package resolve

      - name: Build for simulator
        run: |
          xcodebuild \
            -project NyaayDesk.xcodeproj \
            -scheme NyaayDesk \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            build

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project NyaayDesk.xcodeproj \
            -scheme NyaayDeskTests \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest'

  # ────────────────────────────────────────────────────────────────
  # DEPLOY: Upload AAB to Play Store (on main branch push only)
  # ────────────────────────────────────────────────────────────────
  deploy-android:
    name: Deploy to Play Store (Internal Track)
    needs: android-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: nyaaydesk-release.aab

      - name: Upload to Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.nyaaydesk.app
          releaseFiles: nyaaydesk-release.aab
          track: internal
          status: completed
