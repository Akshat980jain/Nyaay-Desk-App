<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<body class="bg-background text-on-background font-body-base min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Background Split -->
<div class="absolute inset-0 z-0 flex flex-col pointer-events-none">
<div class="h-1/3 w-full bg-primary-container"></div>
<div class="h-2/3 w-full bg-background"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile flex flex-col items-center">
<!-- Header Section -->
<header class="w-full text-center mb-8">
<h1 class="font-display-lg text-display-lg text-on-primary">Nyaay Desk</h1>
<p class="font-body-base text-body-base text-on-primary-container mt-2">Secure Judicial Access Portal</p>
</header>
<!-- Main Card -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_4px_24px_-4px_rgba(0,0,0,0.05)] overflow-hidden">
<div class="p-6">
<!-- Role Selection -->
<div class="mb-8">
<p class="font-label-sm text-label-sm text-on-surface-variant mb-4 uppercase tracking-wider text-center">Select Role to Continue</p>
<div class="grid grid-cols-4 gap-2">
<!-- Role: Advocate -->
<button class="flex flex-col items-center justify-center p-3 rounded-lg border-2 border-secondary-container bg-surface-bright transition-colors">
<span class="material-symbols-outlined text-secondary-container mb-1" style="font-variation-settings: 'FILL' 1;">gavel</span>
<span class="font-label-sm text-label-sm text-on-surface text-center">Advocate</span>
</button>
<!-- Role: Litigant -->
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-outline mb-1">person</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-center">Litigant</span>
</button>
<!-- Role: Clerk -->
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-outline mb-1">folder_shared</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-center">Clerk</span>
</button>
<!-- Role: Admin -->
<button class="flex flex-col items-center justify-center p-3 rounded-lg border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-outline mb-1">admin_panel_settings</span>
<span class="font-label-sm text-label-sm text-on-surface-variant text-center">Admin</span>
</button>
</div>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-4">
<!-- Identifier Input -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface" for="identifier">Registration Number / ID</label>
<input class="h-touch-target px-4 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-all font-body-base text-body-base placeholder:text-outline/60" id="identifier" placeholder="e.g. ADV-2023-458" type="text"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1">
<label class="font-label-sm text-label-sm text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full h-touch-target pl-4 pr-12 rounded-lg border border-outline-variant bg-surface-container-lowest text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-all font-body-base text-body-base placeholder:text-outline/60" id="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-0 top-0 h-full px-3 text-outline hover:text-on-surface flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex justify-between items-center mt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="rounded border-outline-variant text-secondary-container focus:ring-secondary-container w-4 h-4" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="mt-4 h-touch-target w-full bg-secondary-container text-on-secondary-container font-headline-md text-headline-md rounded-lg shadow-[0_4px_8px_-2px_rgba(254,174,44,0.2)] hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center gap-2" type="submit">
<span>Secure Login</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<div class="bg-surface-container-low p-4 border-t border-outline-variant flex justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">help</span>
                    Support
                </a>
<a class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]">menu_book</span>
                    User Guide
                </a>
</div>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-outline">
<span class="material-symbols-outlined text-[18px]">lock</span>
<span class="font-label-sm text-label-sm">End-to-End Encrypted Connection</span>
</div>
</main>
</body></html>
