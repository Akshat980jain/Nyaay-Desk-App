<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Schedule Meeting - Nyaay Desk</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#c4c6cc",
                        "surface-container-highest": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "outline": "#74777d",
                        "primary-container": "#0f1c2c",
                        "error-container": "#ffdad6",
                        "tertiary": "#000000",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffddb4",
                        "on-tertiary-container": "#79849d",
                        "tertiary-fixed-dim": "#bbc6e2",
                        "on-surface": "#191c1d",
                        "on-background": "#191c1d",
                        "surface-container": "#edeeef",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-surface-variant": "#44474c",
                        "background": "#f8f9fa",
                        "tertiary-fixed": "#d7e2ff",
                        "on-primary-fixed-variant": "#3a4859",
                        "on-secondary-container": "#6b4500",
                        "on-primary-fixed": "#0f1c2c",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f3f4f5",
                        "secondary": "#835500",
                        "on-primary-container": "#778598",
                        "primary-fixed": "#d6e4f9",
                        "on-tertiary-fixed": "#101b30",
                        "primary": "#000000",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-container-high": "#e7e8e9",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#525f71",
                        "on-secondary-fixed-variant": "#633f00",
                        "inverse-primary": "#bac8dc",
                        "primary-fixed-dim": "#bac8dc",
                        "tertiary-container": "#101b30",
                        "surface-dim": "#d9dadb",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "on-tertiary-fixed-variant": "#3c475d",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#291800",
                        "secondary-fixed-dim": "#ffb955",
                        "secondary-container": "#feae2c",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "32px",
                        "gutter": "16px",
                        "base": "8px",
                        "touch-target": "48px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "case-number": ["JetBrains Mono"],
                        "body-base": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "case-number": ["15px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-base pb-[80px]">
<!-- TopAppBar -->
<header class="bg-primary-container text-on-primary-container docked full-width top-0 border-b border-outline-variant flat no shadows hover:bg-primary/10 transition-colors flex justify-between items-center w-full px-margin-mobile h-touch-target z-50 sticky">
<div class="flex items-center gap-gutter">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">gavel</span>
<h1 class="font-headline-md text-headline-md text-secondary-container font-bold">Nyaay Desk</h1>
</div>
<div class="flex items-center gap-gutter">
<span class="font-headline-md text-headline-md text-secondary-container font-bold">Schedule Meeting</span>
</div>
<button class="font-label-sm text-label-sm hover:text-secondary-fixed-dim transition-colors">Logout</button>
</header>
<main class="flex-grow p-margin-mobile md:p-margin-desktop max-w-3xl mx-auto w-full">
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg p-margin-mobile md:p-margin-desktop shadow-sm flex flex-col gap-margin-mobile">
<!-- Case Number Selection -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="caseNumber">Case Reference</label>
<div class="relative">
<select class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 appearance-none font-case-number text-case-number" id="caseNumber">
<option disabled="" selected="" value="">Select Case Number</option>
<option value="CL2026M874">CL2026M874 - Property Dispute</option>
<option value="CR2025F112">CR2025F112 - Contract Breach</option>
<option value="FM2024S900">FM2024S900 - Family Matters</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
</div>
</div>
<!-- Meeting Type -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="meetingType">Meeting Type</label>
<div class="relative">
<select class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 appearance-none font-body-base text-body-base" id="meetingType">
<option disabled="" selected="" value="">Select Meeting Type</option>
<option value="video">Video Pleading</option>
<option value="discussion">Case Discussion</option>
<option value="consultation">Advocate Consultation</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">arrow_drop_down</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-margin-mobile">
<!-- Date Picker -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="meetingDate">Date</label>
<div class="relative">
<input class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline-variant rounded-lg text-on-surface focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container/20 font-body-base text-body-base [color-scheme:light]" id="meetingDate" type="date"/>
</div>
</div>
<!-- Time Slot -->
<div class="flex flex-col gap-base">
<label class="font-label-sm text-label-sm text-on-surface-variant">Time Slot</label>
<div class="grid grid-cols-3 gap-base h-touch-target">
<button class="bg-surface-container-low border border-outline-variant rounded-lg font-label-sm text-label-sm text-on-surface hover:bg-surface-container-high transition-colors flex items-center justify-center">Morning</button>
<button class="bg-secondary-container/20 border-2 border-secondary-container rounded-lg font-label-sm text-label-sm text-on-surface font-semibold flex items-center justify-center">Afternoon</button>
<button class="bg-surface-container-low border border-outline-variant rounded-lg font-label-sm text-label-sm text-on-surface hover:bg-surface-container-high transition-colors flex items-center justify-center">Evening</button>
</div>
</div>
</div>
<!-- Participants Section -->
<div class="flex flex-col gap-base mt-margin-mobile border-t border-outline-variant pt-margin-mobile">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant">Participants</label>
<button class="text-secondary-container font-label-sm text-label-sm flex items-center gap-1 hover:text-secondary-fixed-dim">
<span class="material-symbols-outlined text-[16px]">add</span> Add
                    </button>
</div>
<div class="flex flex-col gap-base">
<div class="bg-surface-container-low rounded-lg p-3 flex justify-between items-center border border-outline-variant">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container text-secondary-container flex items-center justify-center font-bold">
                                AK
                            </div>
<div>
<p class="font-body-base text-body-base font-semibold">Advocate Kumar</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Primary Counsel</p>
</div>
</div>
<button class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="bg-surface-container-low rounded-lg p-3 flex justify-between items-center border border-outline-variant">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container text-secondary-container flex items-center justify-center font-bold">
                                RS
                            </div>
<div>
<p class="font-body-base text-body-base font-semibold">Rahul Sharma (You)</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Petitioner</p>
</div>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="mt-margin-desktop">
<button class="w-full h-touch-target bg-secondary-container text-on-secondary-container rounded-lg font-headline-md text-[18px] shadow-sm hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined">event_available</span>
                    Confirm Schedule
                </button>
</div>
</div>
</main>
<!-- BottomNavBar (Hidden on MD/Desktop, visible on Mobile) -->
<nav class="md:hidden bg-primary-container text-secondary-container fixed bottom-0 w-full z-50 border-t border-outline-variant shadow-lg flex justify-around items-center h-16 pb-safe px-2">
<button class="flex flex-col items-center justify-center text-on-primary-container opacity-60 hover:text-secondary-fixed-dim hover:opacity-100 transition-colors scale-95 duration-150 py-1 px-2 rounded-xl">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm mt-1">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-primary-container opacity-60 hover:text-secondary-fixed-dim hover:opacity-100 transition-colors scale-95 duration-150 py-1 px-2 rounded-xl">
<span class="material-symbols-outlined">folder_open</span>
<span class="font-label-sm text-label-sm mt-1">Cases</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary-container font-bold bg-tertiary-container/50 rounded-xl px-2 py-1 hover:text-secondary-fixed-dim transition-colors scale-95 duration-150">
<span class="material-symbols-outlined">event_note</span>
<span class="font-label-sm text-label-sm mt-1">Hearings</span>
</button>
<button class="flex flex-col items-center justify-center text-on-primary-container opacity-60 hover:text-secondary-fixed-dim hover:opacity-100 transition-colors scale-95 duration-150 py-1 px-2 rounded-xl">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-sm text-label-sm mt-1">Notifications</span>
</button>
</nav>
</body></html>
